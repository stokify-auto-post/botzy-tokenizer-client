# bridge_local_config.yaml — Gate 1 localhost bridge (R13)
#
# SAFETY MODEL (current): 127.0.0.1-ONLY bind + GET-only + a 64-char constant-time
# bridge TOKEN. That is the whole gate. The old Origin/403 "fail-closed" gate was
# REMOVED — an MV3 service-worker loopback fetch sends NO Origin (the browser strips
# it; JS cannot set it), so an origin check would only have broken the legitimate
# widget. Security does NOT depend on the value below.
# This file carries NO secret — the bridge token lives in token_file (0600),
# minted once by local_bridge.py on first run (normally AUTO-PAIRED to the widget
# via /v1/pair; the printed token is only a manual-paste fallback).
#
# allowed_extension_origin: NO EDIT REQUIRED. It is used ONLY as the
# Access-Control-Allow-Origin reply header; the host-permissioned service worker
# ignores it, and it is NOT part of the security gate. Leaving the placeholder is
# safe. (Set it to your real chrome-extension://<id> only if you want the reply
# header to name the exact id — purely cosmetic.)

bind_host: "127.0.0.1"
port: 8765
# token_file: leave unset → local_bridge.py defaults to "<reader-dir>/.bridge_token"
#             (minted 0600 on first run, then printed once as a manual-paste fallback).
allowed_extension_origin: "chrome-extension://REPLACE_WITH_EXTENSION_ID"
state_path: "/v1/state"
dtach_dir: "/tmp"
dtach_prefix: "dtach-"
